# Xarex Probe Configuration
# Edit this file once — the probe reads it automatically on startup.
# No need to set environment variables manually.

# Your organisation ID (from the Xarex dashboard → Settings)
ORG_ID=61d48eb4-53b9-4e49-8e2e-63e943f9dac5

# Address of the Xarex Cloud Brain gRPC port
CLOUD_BRAIN_ADDR=localhost:50051

# Stable probe ID — keeps the same identity across restarts
PROBE_ID=xarex-probe-home-dell

# Optional: comma-separated subnets to scan (leave blank to auto-detect)
# Example: SCAN_SUBNETS=192.168.1.0/24,10.0.0.0/24
SCAN_SUBNETS=
