version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xarex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xarex
      POSTGRES_PASSWORD: xarex
      POSTGRES_DB: xarex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xarex -d xarex"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cloud-brain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xarex-cloud-brain
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://xarex:xarex@postgres:5432/xarex
    ports:
      - "8005:8005"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8005
      --workers 1
      --log-level info

volumes:
  postgres_data:
