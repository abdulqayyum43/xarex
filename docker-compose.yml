version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://xarex:xarex@db:5432/xarex
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - APOLLO_API_KEY=${APOLLO_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/app

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: xarex
      POSTGRES_USER: xarex
      POSTGRES_PASSWORD: xarex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xarex"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
